; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; --- What PlatformIO compiles ---
; PlatformIO only compiles files inside src/ and lib/.
; The tools/ directory contains host-side utilities (C++ programs that run
; on your Mac, not on the ESP32). PlatformIO never touches that folder.
; Do not move tool source files into src/ or lib/ or they will be compiled
; into the firmware by mistake.

[env:m5stick-c]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
; build_flags = -DDEBUG    ; Remove or comment out this line to suppress all debug Serial output
lib_deps = 
	m5stack/M5Unified@^0.2.13
	m5stack/M5StickCPlus2@^1.0.2
    dfrobot/DFRobot_GP8XXX @ 1.0.1

